version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sapz/platform-backend:1.0.0
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: sapz_platform
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sapz/platform-frontend:1.0.0
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: sapz_platform
      POSTGRES_USER: sapz_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecureProdPass2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sapz_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-MinioSecurePass2026!}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
