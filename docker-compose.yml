version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sapz_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: sapz_db
      DB_USERNAME: sapz_user
      DB_PASSWORD: sapz_password_secret
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/var/www/html

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sapz_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  postgres:
    image: postgres:16-alpine
    container_name: sapz_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sapz_db
      POSTGRES_USER: sapz_user
      POSTGRES_PASSWORD: sapz_password_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sapz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sapz_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.0.0
    container_name: sapz_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
