openapi: 3.1.0
info:
  title: SAPZ ESM & CKR Enterprise API
  description: Official RESTful API Blueprint for SAPZ Enterprise System Management & Central Knowledge Repository Platform.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local Development Server
paths:
  /health:
    get:
      summary: Operational Health Check
      responses:
        '200':
          description: System Status Operational
  /auth/login:
    post:
      summary: User Authentication Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication Token Issued
        '401':
          description: Invalid Credentials
  /users:
    get:
      summary: List Users (Paginated)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User List
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
